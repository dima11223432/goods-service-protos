syntax = "proto3";

package goods.v1;

import "google/protobuf/timestamp.proto";

option go_package = "goods-service/api/v1;goods_v1";

service GoodsService {
  rpc GetProductRating(GetProductRatingRequest) returns (GetProductRatingResponse);
  rpc GetProductCard(GetProductCardRequest) returns (GetProductCardResponse);
  rpc SearchProducts(SearchProductsRequest) returns (SearchProductsResponse);
}

message GetProductCardRequest {
  string barcode = 1;
}

message GetProductCardResponse {
  oneof result {
    string barcode_pending = 1;
    Product product = 2;
  }
}

message Product {
  string barcode = 1;
  int32 status = 2;
  string name = 3;
  string brands = 4;
  string quantity = 5;
  repeated string categories = 6;
  repeated string labels = 7;
  repeated string allergens = 8;
  repeated string additives = 9;
  repeated Ingredient ingredients = 10;
  string ingredients_text = 11;

  Nutriments nutriments = 12;
  NutrientLevels nutrient_levels = 13;
  Nutriscore nutriscore = 14;
  int32 nova_group = 15;
  string ecoscore_grade = 16;
  string image_url = 17;
}

message Nutriments {
  double energy_kcal = 1;
  double fat = 2;
  double saturated_fat = 3;
  double carbohydrates = 4;
  double sugars = 5;
  double added_sugars = 6;
  double fiber = 7;
  double proteins = 8;
  double salt = 9;
  double sodium = 10;
}

message NutrientLevels {
  string fat = 1;
  string saturated_fat = 2;
  string sugars = 3;
  string salt = 4;
}

message Nutriscore {
  string grade = 1;
  int32 score = 2;
}

message Ingredient {
  string ID = 1;
  string text = 2;
  double percent_estimate = 3;
  string vegan = 4;
  string vegetarian = 5;
}

message SearchProductsRequest {
  string query = 1;
  int32 offset = 2;
  int32 limit = 3;
}

message SearchProductsResponse {
  repeated Product products = 1;
  int64 total = 2;
}

message RatingResult {
  string type = 1;
  double score = 2;
  string label = 3;
  map<string, double> details = 4;
}

message ProductRatings {
  string barcode = 1;
  repeated RatingResult ratings = 2;
  google.protobuf.Timestamp updated_at = 3;
}

message GetProductRatingRequest {
  string barcode = 1;
}

message GetProductRatingResponse {
  ProductRatings ratings = 1;
}
